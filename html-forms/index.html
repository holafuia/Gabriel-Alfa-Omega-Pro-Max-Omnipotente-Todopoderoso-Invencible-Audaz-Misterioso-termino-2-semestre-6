<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            FSY Log In
        </title>
    </head>
    <body>
        <img src="https://aaroncalahorra-computerlab.notion.site/image/attachment%3A1e4e3ffc-aecc-4524-aeb4-9df0fefe6cf5%3Aimage.png?table=block&id=3175b127-bb52-8047-b166-e0a4ec3ba135&spaceId=c4b8832f-7e93-4972-ba52-2bd9f7b273cf&width=1580&userId=&cache=v2" height="400">
        <br>
        <a href="https://www.churchofjesuschrist.org/youth/childrenandyouth/fsy/?lang=eng/" target="_blank">Enter to the FSY website</a>
        <form>
            <label for="firstname">First name(s): </label>
            <input type="text" name="firstname" required>
            <br>
            <label for="lastname">Last Name: </label>
            <input type="text" name="lastname" required>
            <br>
            <label for="age">Age: </label>
            <input type="text" name="age" required>
            <br>
            <label for="birth">Birthday: </label>
            <input type="date" name="birth" required>
            <br>
            <label for="allergies">Do you have any allergies? Mention them if you have: </label>
            <input type="text" name="allergies" required>
            <br>
            <label for="email">Email: </label>
            <input type="email" name="email" required>
            <br>
            <label for="phone">Phone number: </label>
            <input type="text" name="phone" required>
            <br>
            <input type="button" value="for your stress :)">
            <br>
            <label for="place">State and country: </label>
            <input type="text" name="place" required>
            <br>
            <label for="church">Ward: </label>
            <input type="text" name="church" required>
            <br>
            <p>Are you attending?</p>
            <input type="radio" id="yes" name="queso" value="Yes">
            <label for="yes">Yes</label><br>
            <input type="radio" id="no" name="queso" value="No">
            <label for="no">No</label><br>
            <input type="radio" id="dinosourio" name="queso" value="Dinosourio">
            <label for="dinosaurio">Dinosaurio</label><br><br>
            <input type="submit">
        </form>
    </body>

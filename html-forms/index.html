<!DOCTYPE html>
<html lang="en">
    <head>
        <title>
            FSY Log In
        </title>
    </head>
    <body>
        <form>
            <label for="firstname">First name(s): </label>
            <input type="text" name="firstname" required>
            <br>
            <label for="lastname">Last Name: </label>
            <input type="text" name="lastname" required>
            <br>
            <label for="age">Age: </label>
            <input type="text" name="age" required>
            <br>
            <label for="allergies">Do you have any allergies? Mention them if you have: </label>
            <input type="text" name="allergies" required>
            <br>
            <label for="email">Email: </label>
            <input type="email" name="email" required>
            <br>
            <label for="phone">Phone number: </label>
            <input type="text" name="phone" required>
            <br>
            <input type="button" value="for your stress :)">
            <br>
            <label for="place">State and country: </label>
            <input type="text" name="place" required>
            <br>
            <label for="church">Ward: </label>
            <input type="text" name="church" required>
            <br>
            <input type="submit">
        </form>
    </body>
